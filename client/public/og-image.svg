<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2A33"/>
      <stop offset="100%" stop-color="#253545"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8664FB"/>
      <stop offset="100%" stop-color="#47C8F5"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8664FB"/>
      <stop offset="100%" stop-color="#47C8F5"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8664FB" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#8664FB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#47C8F5" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#47C8F5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Orbs -->
  <circle cx="1050" cy="100" r="340" fill="url(#orb1)"/>
  <circle cx="160" cy="530" r="260" fill="url(#orb2)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="80" y="100" width="5" height="430" rx="3" fill="url(#accentV)"/>

  <!-- Logo badge -->
  <rect x="110" y="100" width="64" height="64" rx="14" fill="url(#accent)"/>
  <text x="142" y="143" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="28" fill="white">P</text>

  <!-- Brand name -->
  <text x="192" y="132" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="28" fill="white" letter-spacing="0.5">De Proces Designers</text>
  <text x="192" y="155" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="16" fill="rgba(255,255,255,0.45)" letter-spacing="1">WWW.DEPROCESDESIGNERS.NL</text>

  <!-- Divider -->
  <rect x="110" y="194" width="900" height="1.5" rx="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Main headline -->
  <text x="110" y="290" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="62" fill="white" letter-spacing="-1">Meer Klanten.</text>
  <text x="110" y="365" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="62" letter-spacing="-1">
    <tspan fill="url(#accent)">Slimmer Groeien.</tspan>
  </text>
  <text x="110" y="432" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="46" fill="rgba(255,255,255,0.55)" letter-spacing="-0.5">Zonder Gedoe.</text>

  <!-- Service pills -->
  <rect x="110" y="462" width="186" height="38" rx="19" fill="rgba(134,100,251,0.18)" stroke="#8664FB" stroke-width="1" stroke-opacity="0.5"/>
  <text x="203" y="486" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="15" fill="#a78bff">Leadgeneratie</text>

  <rect x="310" y="462" width="152" height="38" rx="19" fill="rgba(134,100,251,0.18)" stroke="#8664FB" stroke-width="1" stroke-opacity="0.5"/>
  <text x="386" y="486" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="15" fill="#a78bff">Funnels</text>

  <rect x="476" y="462" width="208" height="38" rx="19" fill="rgba(71,200,245,0.15)" stroke="#47C8F5" stroke-width="1" stroke-opacity="0.5"/>
  <text x="580" y="486" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="15" fill="#7dd8f0">Automatisering</text>

  <!-- Stats -->
  <rect x="110" y="526" width="940" height="1" fill="rgba(255,255,255,0.06)"/>

  <text x="110" y="598" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="38" fill="url(#accent)">43+</text>
  <text x="110" y="618" font-family="Inter, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">Actieve klanten</text>

  <text x="280" y="598" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="38" fill="url(#accent)">3.4×</text>
  <text x="280" y="618" font-family="Inter, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">Gemiddelde groei</text>

  <text x="460" y="598" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="38" fill="url(#accent)">98%</text>
  <text x="460" y="618" font-family="Inter, Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">Klanttevredenheid</text>

  <!-- Right decorative circle -->
  <circle cx="1060" cy="380" r="140" fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-opacity="0.2"/>
  <circle cx="1060" cy="380" r="100" fill="none" stroke="url(#accent)" stroke-width="1" stroke-opacity="0.15"/>
  <text x="1060" y="400" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="52" fill="url(#accent)" opacity="0.7">DPD</text>
</svg>
